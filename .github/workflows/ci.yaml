---
  name: Docker Image CI
  
  on:
    pull_request:
      branches:
        - main
  
  env:
    IMAGE_NAME: artis3n/docker-rhel9-ansible
  
  jobs:
    lint:
      runs-on: ubuntu-latest
  
      steps:
        - uses: actions/checkout@v6
  
        - uses: hadolint/hadolint-action@v3.3.0
          with:
            ignore: DL3007,DL3003,SC2086,DL3041,DL3013,DL3059,SC3037
  
    test:
      runs-on: ubuntu-latest
  
      steps:
      - uses: actions/checkout@v6
  
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Install Goss
        uses: e1himself/goss-installation-action@v1.3.0
  
      - name: Build and Export
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
      - name: Test the Docker image
        run: dgoss run -it --rm --privileged --cgroupns=host --volume=/sys/fs/cgroup:/sys/fs/cgroup:rw ${{ env.IMAGE_NAME }}:test
